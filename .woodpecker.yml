when:
  event: push

clone:
  git:
    image: woodpeckerci/plugin-git
    settings:
      attempts: 5
      backoff: 10s

steps:
  - name: build-and-push
    image: woodpeckerci/plugin-docker-buildx
    settings:
      # Phase 4 of forgejo-registry-consolidation 2026-05-07 —
      # registry.viktorbarzin.me decommissioned. Forgejo only.
      repo:
        - forgejo.viktorbarzin.me/viktor/claude-agent-service
      logins:
        - registry: forgejo.viktorbarzin.me
          username:
            from_secret: forgejo_user
          password:
            from_secret: forgejo_push_token
      dockerfile: Dockerfile
      context: .
      auto_tag: true
      platforms:
        - linux/amd64
